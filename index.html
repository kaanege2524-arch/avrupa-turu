  photos:load("ph9",{}),
  customItems:load("ci9",{}),
  activeTab:"cities",
  selCity:null,
  cityTab:"checklist",
  expRest:null,
  addMode:null,
  modalType:null,
  showConfirm:null,
};

function initCities(){
  const cc=load("cc9",[]);
  const deleted=load("deleted9",[]);
  const defaults=CITIES0.filter(c=>!deleted.includes(c.id));
  state.cities=[...defaults,...cc];
}
initCities();

// ── HELPERS ──
const mapsUrl=q=>`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
const getItems=(cid,t)=>{
  const city=state.cities.find(c=>c.id===cid);
  const custom=(state.customItems[cid]&&state.customItems[cid][t])||[];
  return [...(city?.[t]||[]),...custom.map(i=>({...i,isCustom:true}))];
};
const getChecked=(cid,t,i)=>!!state.progress[`${cid}_${t}_${i}`];
const getPhotos=(cid,t,i)=>state.photos[`${cid}_${t}_${i}`]||[];
const getCityProg=c=>{
  let d=0,t=0;
  ["restaurants","foods","snacks","attractions","activities"].forEach(type=>{
    const a=getItems(c.id,type);
    t+=a.length;
    a.forEach((_,i)=>{if(getChecked(c.id,type,i))d++;});
  });
  return{done:d,total:t,pct:t?Math.round(d/t*100):0};
};

// ── ACTIONS ──
function toggleCheck(cid,t,i){
  const k=`${cid}_${t}_${i}`;
  state.progress={...state.progress,[k]:!state.progress[k]};
  save("tp9",state.progress);
  render();
}
function deleteCity(id){
  state.cities=state.cities.filter(c=>c.id!==id);
  save("cc9",state.cities.filter(c=>c.isCustom));
  const del=[...load("deleted9",[]),id];
  save("deleted9",del);
  if(state.selCity===id)state.selCity=null;
  render();
}
function addCustomItem(cid,t,item){
  const prev=state.customItems[cid]||{};
  state.customItems={...state.customItems,[cid]:{...prev,[t]:[...(prev[t]||[]),item]}};
  save("ci9",state.customItems);
  render();
}
function deleteCustomItem(cid,t,gi){
  const city=state.cities.find(c=>c.id===cid);
  const bl=(city?.[t]||[]).length;
  const ci2=gi-bl;
  if(ci2<0)return;
  const prev=state.customItems[cid]||{};

// ── IMAGE RESIZE ──
async function resizeImg(file){
  return new Promise(res=>{
    const rd=new FileReader();
    rd.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const r=Math.min(800/img.width,800/img.height,1);
        const c=document.createElement("canvas");
        c.width=img.width*r;c.height=img.height*r;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",0.72));
      };
      img.src=e.target.result;
    };
    rd.readAsDataURL(file);
  });
}
function addPhoto(cid,t,i,b64){
  const k=`${cid}_${t}_${i}`;
  state.photos={...state.photos,[k]:[...(state.photos[k]||[]),b64]};
  save("ph9",state.photos);
  render();
}
function deletePhoto(cid,t,i,pi){
  const k=`${cid}_${t}_${i}`;
  state.photos={...state.photos,[k]:(state.photos[k]||[]).filter((_,j)=>j!==pi)};
  save("ph9",state.photos);
  render();
}

// ── HTML BUILDERS ──
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el[k.toLowerCase()]=v;
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(child=>{
      if(child==null||child===false)return;
      el.appendChild(typeof child==="string"?document.createTextNode(child):child);
    });
  }
  return el;
}
const div=(a,c)=>h("div",a,c);
const btn=(a,c)=>h("button",a,c);
const span=(a,c)=>h("span",a,c);
const a=(at,c)=>h("a",at,c);

function photoStrip(photos,onAdd,onDel,accent){
  const wrap=div({style:{marginTop:6}});
  if(photos.length>0){
    const grid=div({style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:7}});
    photos.forEach((p,i)=>{
      const cell=div({style:{position:"relative",borderRadius:8,overflow:"hidden",aspectRatio:"1"}});
      const img=h("img",{src:p,style:{width:"100%",height:"100%",objectFit:"cover"}});
      const delBtn=btn({style:{position:"absolute",top:3,right:3,background:"rgba(0,0,0,0.75)",border:"none",color:"#fff",borderRadius:4,padding:"2px 5px",cursor:"pointer",fontSize:10},onclick:()=>onDel(i)},"✕");
      cell.appendChild(img);cell.appendChild(delBtn);
      grid.appendChild(cell);
    });
    wrap.appendChild(grid);
  }
  const addBtn=btn({style:{width:"100%",background:accent+"10",border:`1px dashed ${accent}55`,borderRadius:8,padding:"8px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,color:accent,fontSize:11},onclick:()=>{

  }},["📷 Fotoğraf Ekle"]);
  wrap.appendChild(addBtn);
  return wrap;
}

        grid.appendChild(ob);
      });
      wrap.appendChild(grid);
    } else {
      const input=inp({placeholder:f.ph||"",style:{width:"100%",background:"#1a1a1a",border:"1px solid #222",borderRadius:7,padding:"7px 9px",color:"#fff",fontSize:12,boxSizing:"border-box"}});
      input.oninput=e=>formData[f.k]=e.target.value;
      wrap.appendChild(input);
    }
    sheet.appendChild(wrap);
  });

  sheet.appendChild(btn({style:{width:"100%",background:`linear-gradient(135deg,${accent},${accent}99)`,border:"none",color:"#000",borderRadius:9,padding:11,fontSize:13,fontWeight:"bold",cursor:"pointer",marginTop:3},onclick:()=>{
    const reqFields=fields.filter(f=>f.req);
    if(reqFields.some(f=>!formData[f.k]?.trim())){alert("Zorunlu alanları doldurun!");return;}
    const item={};
    fields.forEach(f=>item[f.k]=formData[f.k]||"");
    addCustomItem(cid,type,item);
    state.modalType=null;
    render();
  }},"✓ Kaydet"));

  overlay.appendChild(sheet);
  overlay.onclick=e=>{if(e.target===overlay){state.modalType=null;render();}};
  return overlay;
}

// ── MAIN PAGE ──
function renderMainPage(){
  const page=div({style:{minHeight:"100vh",background:"#080808"}});

  // Header
  const hdr=div({style:{background:"linear-gradient(135deg,#1a0533,#0d1f3c,#0a1f10)",padding:"18px 13px 13px",borderBottom:"1px solid #0f0f0f"}});
  hdr.appendChild(div({style:{fontSize:10,letterSpacing:4,color:"#1a1a2a",marginBottom:3}},"AİLE SEYAHAT REHBERİ"));
  hdr.appendChild(div({style:{fontSize:20,fontWeight:"bold"}},"✈️ Avrupa Turu 2026"));
  hdr.appendChild(div({style:{fontSize:11,color:"#f5a623",marginTop:3}},"5 – 22 Temmuz · "+state.cities.length+" Şehir · 3 Kişi"));
  
  // Global progress
  let td=0,tt=0;
  state.cities.forEach(c=>{const p=getCityProg(c);td+=p.done;tt+=p.total;});
  const gp=tt?Math.round(td/tt*100):0;
  const gpWrap=div({style:{marginTop:7,background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"6px 9px"}});
  gpWrap.appendChild(div({style:{display:"flex",justifyContent:"space-between",marginBottom:3}},[
    span({style:{fontSize:10,color:"#2a2a2a"}},"Toplam İlerleme"),
    span({style:{fontSize:10,fontWeight:"bold",color:"#f5a623"}},td+"/"+tt+" · %"+gp)
  ]));
  const gpBar=div({style:{background:"rgba(0,0,0,0.5)",borderRadius:4,height:5}});
  gpBar.appendChild(div({style:{background:"linear-gradient(90deg,#f5a623,#e74c8b)",height:5,borderRadius:4,width:gp+"%",transition:"width 0.4s"}}));
  gpWrap.appendChild(gpBar);
  hdr.appendChild(gpWrap);
  page.appendChild(hdr);

  // Tab bar
  const tabBar=div({style:{display:"flex",background:"#080808",borderBottom:"1px solid #0f0f0f",position:"sticky",top:0,zIndex:10}});
  ["cities","transport","tickets"].forEach(t=>{
    const tb=btn({style:{flex:1,padding:"11px 3px",border:"none",borderBottom:state.activeTab===t?"3px solid #f5a623":"3px solid transparent",background:"transparent",color:state.activeTab===t?"#f5a623":"#2a2a2a",fontSize:10,cursor:"pointer",fontWeight:"bold"},onclick:()=>{state.activeTab=t;render();}},
      t==="cities"?"🏙️ Şehirler":t==="transport"?"🚄 Ulaşım":"🎟️ Biletler");
    tabBar.appendChild(tb);
  });
  page.appendChild(tabBar);

  const content=div({style:{padding:11,paddingBottom:80}});

  // CITIES TAB
  if(state.activeTab==="cities"){
    state.cities.forEach(c=>{
      const prog=getCityProg(c);
      const card=div({style:{background:c.bg,borderRadius:13,marginBottom:9,overflow:"hidden",border:"1px solid rgba(255,255,255,0.05)",position:"relative",cursor:"pointer"}});
      
      // Delete button bottom-right
      const delBtn=btn({style:{position:"absolute",bottom:8,right:8,zIndex:5,background:"rgba(0,0,0,0.7)",border:"1px solid rgba(255,80,80,0.5)",color:"#ff6666",borderRadius:7,padding:"4px 8px",cursor:"pointer",fontSize:13,fontWeight:"bold",lineHeight:1},
        onclick:e=>{e.stopPropagation();if(confirm('"'+c.name+'" şehrini listeden kaldırmak istiyor musunuz?'))deleteCity(c.id);}
      },"✕");
      card.appendChild(delBtn);

      const inner=div({style:{padding:"12px 13px"},onclick:()=>{state.selCity=c.id;state.cityTab="checklist";state.expRest=null;render();}});
      const top=div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7}});
      const left=div({style:{display:"flex",alignItems:"center",gap:6}},[
        span({style:{fontSize:22}},c.flag),
        div({},[div({style:{fontSize:14,fontWeight:"bold"}},c.name),div({style:{fontSize:9,opacity:0.6,marginTop:1}},c.country)])
      ]);
      const right=div({style:{textAlign:"right",paddingRight:24}},[
        div({style:{fontSize:10,color:c.accent,fontWeight:"bold"}},c.dates||"—"),
        div({style:{fontSize:9,opacity:0.5,marginTop:1}},c.nights+" gece")
      ]);
      top.appendChild(left);top.appendChild(right);
      inner.appendChild(top);

      const progWrap=div({style:{background:"rgba(0,0,0,0.3)",borderRadius:6,padding:"5px 8px"}});
      progWrap.appendChild(div({style:{display:"flex",justifyContent:"space-between",marginBottom:3}},[
        span({style:{fontSize:8,color:"rgba(255,255,255,0.4)"}},"İlerleme"),
        span({style:{fontSize:9,fontWeight:"bold",color:c.accent}},prog.done+"/"+prog.total+" · %"+prog.pct)
      ]));
      const bar=div({style:{background:"rgba(0,0,0,0.4)",borderRadius:3,height:3}});
      bar.appendChild(div({style:{background:c.accent,height:3,borderRadius:3,width:prog.pct+"%"}}));
      progWrap.appendChild(bar);
      inner.appendChild(progWrap);

      const badges=div({style:{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}});
      ["restaurants","foods","snacks","attractions","activities"].forEach(t=>{
        const items=getItems(c.id,t);
        if(!items.length)return;
        const done=items.filter((_,i)=>getChecked(c.id,t,i)).length;
        badges.appendChild(div({style:{background:"rgba(0,0,0,0.3)",borderRadius:5,padding:"2px 6px",fontSize:8,color:done===items.length?c.accent:"rgba(255,255,255,0.4)"}},
          done+"/"+items.length+" "+(t==="restaurants"?"🍽️":t==="foods"?"🥘":t==="snacks"?"🍿":t==="attractions"?"🗺️":"🎯")));
      });
      inner.appendChild(badges);
      card.appendChild(inner);
      content.appendChild(card);
    });

    // Add buttons
    const addRow=div({style:{display:"flex",gap:6,marginTop:4}});
    addRow.appendChild(btn({style:{flex:1,background:"#0d0d0d",border:"1px dashed #1e1e1e",color:"#666",borderRadius:10,padding:"12px 8px",cursor:"pointer",fontSize:10,fontWeight:"bold"},
      onclick:()=>{state.addMode="manual";render();}},"✏️ Şehir Ekle"));
    content.appendChild(addRow);
  }

  // TRANSPORT TAB
  if(state.activeTab==="transport"){
    content.appendChild(div({style:{fontSize:9,color:"#334",marginBottom:10}},"💡 Hepsi 3 kişi için. Erken alın!"));
    TRANSPORT.forEach(t=>{
      const card=div({style:{background:"#0d0d0d",borderRadius:11,marginBottom:7,padding:"11px 12px",border:"1px solid #181818",borderLeft:"3px solid #f5a623"}});
      card.appendChild(div({style:{fontWeight:"bold",fontSize:12,marginBottom:5}},t.f1+" "+t.from+" → "+t.f2+" "+t.to));
      const badges2=div({style:{display:"flex",gap:4,marginBottom:6}});
      badges2.appendChild(div({style:{background:"#141414",borderRadius:10,padding:"2px 7px",fontSize:10}},t.type));
      badges2.appendChild(div({style:{background:"#141414",borderRadius:10,padding:"2px 7px",fontSize:10}},"⏱️ "+t.dur));
      card.appendChild(badges2);
      const prices=div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:5}});
      const p1=div({style:{background:"#080808",borderRadius:7,padding:"6px 7px"}});
      p1.appendChild(div({style:{color:"#222",fontSize:9}},"Kişi Başı"));
      p1.appendChild(div({style:{color:"#f5a623",fontWeight:"bold",fontSize:11,marginTop:1}},t.pp));
      const p2=div({style:{background:"#080808",borderRadius:7,padding:"6px 7px"}});
      p2.appendChild(div({style:{color:"#222",fontSize:9}},"3 Kişi"));
      p2.appendChild(div({style:{color:"#ffd700",fontWeight:"bold",fontSize:11,marginTop:1}},t.aile));
      prices.appendChild(p1);prices.appendChild(p2);
      card.appendChild(prices);
      card.appendChild(div({style:{background:"#080808",borderRadius:7,padding:"5px 7px",marginBottom:5,fontSize:10,color:"#4fc3f7"}},t.book));
      card.appendChild(mapBtn(t.mq,"İstasyona Git","#4fc3f7",true));
      content.appendChild(card);
    });
  }

  // TICKETS TAB
  if(state.activeTab==="tickets"){
    content.appendChild(div({style:{background:"#110404",borderRadius:9,padding:9,marginBottom:9,borderLeft:"3px solid #ff4444"}},[
      div({style:{color:"#ff4444",fontWeight:"bold",fontSize:11,marginBottom:1}},"⚠️ Kritik Bilet Takvimi"),
      div({style:{color:"#2a2a2a",fontSize:10}},"Temmuz pik sezon — erken al!")
    ]));
    TICKETS.forEach(t=>{
      const card=div({style:{background:"#0a0a0a",borderRadius:8,padding:"8px 10px",marginBottom:5,display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:`3px solid ${t.color}`}});
      const left=div({style:{flex:1}});
      left.appendChild(div({style:{fontSize:11,color:"#aaa",fontWeight:"bold",marginBottom:3}},t.item));
      left.appendChild(mapBtn(t.mq,"Konum",t.color,true));
      card.appendChild(left);
      card.appendChild(div({style:{background:t.color+"15",color:t.color,borderRadius:6,padding:"2px 6px",fontSize:9,fontWeight:"bold",marginLeft:5,textAlign:"right",maxWidth:100,lineHeight:1.4}},t.when));
      content.appendChild(card);
    });
  }

  page.appendChild(content);
  return page;
}

// ── ADD CITY MANUAL ──
function renderAddCity(){
  const formData={name:"",country:"",flag:"🏙️",dates:"",nights:2,currency:"€ Euro",currencyTip:"",accent:"#f5a623"};
  const flags=["🏙️","🇩🇪","🇫🇷","🇮🇹","🇪🇸","🇵🇹","🇬🇷","🇳🇱","🇦🇹","🇨🇭","🇧🇪","🇬🇧","🇵🇱","🇨🇿","🇭🇺","🇭🇷","🇹🇷","🌍","🇸🇪","🇩🇰","🇷🇴","🇷🇸"];
  const colors=["#f5a623","#e74c8b","#4fc3f7","#81c784","#ff7043","#ab47bc","#26c6da","#ffca28","#ef5350","#66bb6a"];

  const overlay=div({style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}});
  const sheet=div({style:{background:"#111",borderRadius:"20px 20px 0 0",padding:15,width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto"}});
  
  const hd=div({style:{display:"flex",justifyContent:"space-between",marginBottom:13}});
  hd.appendChild(div({style:{fontSize:14,fontWeight:"bold",color:"#f5a623"}},"✏️ Şehir Ekle"));
  hd.appendChild(btn({style:{background:"#1e1e1e",border:"none",color:"#aaa",borderRadius:7,padding:"4px 10px",cursor:"pointer"},onclick:()=>{state.addMode=null;render();}},"✕"));
  sheet.appendChild(hd);

  [["Şehir Adı *","name","Barcelona",true],["Ülke","country","İspanya"],["Tarihler","dates","23–25 Tem"],["Para Birimi","currency","€ Euro"],["Para Notu","currencyTip","Nakit tercih edilir"],["Kaç Gece","nights","2"]].forEach(([l,k,ph,req])=>{
    const w=div({style:{marginBottom:9}});
    w.appendChild(div({style:{fontSize:10,color:"#444",marginBottom:3}},l));
    const i=inp({placeholder:ph,value:String(formData[k]),style:{width:"100%",background:"#1a1a1a",border:"1px solid #222",borderRadius:7,padding:"7px 9px",color:"#fff",fontSize:12,boxSizing:"border-box"}});
    i.oninput=e=>formData[k]=e.target.value;
    w.appendChild(i);
    sheet.appendChild(w);
  });

  // Flag picker
  sheet.appendChild(div({style:{fontSize:10,color:"#444",marginBottom:5,marginTop:4}},"Bayrak"));
  const flagGrid=div({style:{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12,maxHeight:80,overflowY:"auto"}});
  flags.forEach(f=>{
    const fb=btn({style:{fontSize:18,background:formData.flag===f?"#222":"transparent",border:formData.flag===f?`2px solid ${formData.accent}`:"2px solid transparent",borderRadius:5,padding:"2px 4px",cursor:"pointer"},onclick:()=>{
      formData.flag=f;
      flagGrid.querySelectorAll("button").forEach((b,bi)=>{b.style.background=flags[bi]===f?"#222":"transparent";b.style.border=flags[bi]===f?`2px solid ${formData.accent}`:"2px solid transparent";});
    }},f);
    flagGrid.appendChild(fb);
  });
  sheet.appendChild(flagGrid);

  // Color picker
  sheet.appendChild(div({style:{fontSize:10,color:"#444",marginBottom:5}},"Renk"));
  const colorGrid=div({style:{display:"flex",gap:5,flexWrap:"wrap",marginBottom:13}});
  colors.forEach(c=>{
    const cb2=div({style:{width:23,height:23,borderRadius:"50%",background:c,cursor:"pointer",border:formData.accent===c?"3px solid #fff":"3px solid transparent"},onclick:()=>{
      formData.accent=c;
      colorGrid.querySelectorAll("div").forEach((d,di)=>{d.style.border=colors[di]===c?"3px solid #fff":"3px solid transparent";});
    }});
    colorGrid.appendChild(cb2);
  });
  sheet.appendChild(colorGrid);

  sheet.appendChild(btn({style:{width:"100%",background:"linear-gradient(135deg,#f5a623,#f5a62388)",border:"none",color:"#000",borderRadius:9,padding:11,fontSize:13,fontWeight:"bold",cursor:"pointer"},onclick:()=>{
    if(!formData.name.trim()){alert("Şehir adı zorunlu!");return;}
    const GRADS=["linear-gradient(135deg,#1a0d2e,#2d1b5c)","linear-gradient(135deg,#0d1f3c,#1a5276)","linear-gradient(135deg,#1b4332,#2d6a4f)","linear-gradient(135deg,#4a1040,#8e2469)","linear-gradient(135deg,#4a2000,#9b4d0a)"];
    const newCity={id:"m_"+Date.now(),name:formData.name,flag:formData.flag,country:formData.country,dates:formData.dates,nights:Number(formData.nights)||2,currency:formData.currency,currencyTip:formData.currencyTip,accent:formData.accent,bg:GRADS[Math.floor(Math.random()*GRADS.length)],isCustom:true,restaurants:[],foods:[],snacks:[],attractions:[],activities:[]};
    state.cities.push(newCity);
    save("cc9",state.cities.filter(c=>c.isCustom));
    state.addMode=null;
    render();
  }},formData.flag+" "+formData.name+" Ekle"));

  overlay.appendChild(sheet);
  return overlay;
}

// ── MAIN RENDER ──
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  let main;
  if(state.selCity){
    main=renderCityPage(state.selCity);
  } else if(state.addMode==="manual"){
    main=renderMainPage();
    app.appendChild(main);
    app.appendChild(renderAddCity());
    if(state.modalType){
      const city=state.cities.find(c=>c.id===state.modalType.cid);
      app.appendChild(renderModal(state.modalType.type,state.modalType.cid,city?.accent||"#f5a623"));
    }
    return;
  } else {
    main=renderMainPage();
  }

  app.appendChild(main);

  if(state.modalType){
    const city=state.cities.find(c=>c.id===state.modalType.cid);
    app.appendChild(renderModal(state.modalType.type,state.modalType.cid,city?.accent||"#f5a623"));
  }
}

render();

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', {scope: './'})
      .then(reg => { reg.update(); })
      .catch(() => {});
  });
}
