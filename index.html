/* ── PHOTO STRIP ── */
function PhotoStrip({photos,onAdd,onDelete,accent}){
  const ref=useRef();
  const go=async e=>{const f=e.target.files[0];if(!f)return;onAdd(await resizeImg(f));e.target.value="";};
  return <div>
    {photos.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4,marginBottom:6}}>
      {photos.map((p,i)=><div key={i} style={{position:"relative",borderRadius:7,overflow:"hidden",aspectRatio:"1"}}>
        <img src={p} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
        <button onClick={()=>onDelete(i)} style={{position:"absolute",top:2,right:2,background:"rgba(0,0,0,0.8)",border:"none",color:"#fff",borderRadius:4,padding:"1px 5px",cursor:"pointer",fontSize:10}}>✕</button>
      </div>)}
    </div>}
    <button onClick={()=>ref.current.click()} style={{width:"100%",background:`${accent}10`,border:`1px dashed ${accent}55`,borderRadius:7,padding:"7px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,color:accent,fontSize:10}}>
      <CamIcon s={12}/> Fotoğraf Ekle
    </button>
    <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={go}/>
  </div>;
}

/* ── EU CITY BROWSER ── */
function EUCityBrowser({onAdd,onClose,existingIds}){
  const [q,setQ]=useState("");
  const [country,setCountry]=useState("Tümü");
  const [preview,setPreview]=useState(null);
  const [aiSnacks,setAiSnacks]=useState({});
  const [loadingAI,setLoadingAI]=useState(false);
  const countries=["Tümü",...[...new Set(EU_DB.map(c=>c.country))].sort()];
  const filtered=EU_DB.filter(c=>{
    const qm=!q||c.name.toLowerCase().includes(q.toLowerCase())||c.country.toLowerCase().includes(q.toLowerCase());
    return qm&&(country==="Tümü"||c.country===country);
  });
  const fetchSnacks=async(city)=>{
    if(aiSnacks[city.id]){setPreview({...city,snacks:aiSnacks[city.id]});return;}
    setLoadingAI(true);setPreview({...city,snacks:[]});
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:`${city.name}, ${city.country} için en meşhur 5 sokak yiyeceği. Sadece JSON dön, başka hiçbir şey yazma: {"snacks":[{"name":"ad","emoji":"emoji","price":"fiyat","where":"nerede"}]}`}]})});
      const data=await res.json();
      const text=data.content?.map(i=>i.text||"").join("").replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(text);
      const snacks=parsed.snacks.map(s=>({...s,mq:`${s.name} ${city.name}`}));
      setAiSnacks(p=>({...p,[city.id]:snacks}));
      setPreview({...city,snacks});
    }catch{
      setPreview({...city,snacks:[{name:"Tekrar dene",emoji:"⚠️",price:"—",where:"AI bağlantı hatası"}]});
    }
    setLoadingAI(false);
  };
  const BGS=["linear-gradient(135deg,#1a0d2e,#2d1b5c)","linear-gradient(135deg,#0d1f3c,#1a5276)","linear-gradient(135deg,#1b4332,#2d6a4f)","linear-gradient(135deg,#4a1040,#8e2469)","linear-gradient(135deg,#4a2000,#9b4d0a)","linear-gradient(135deg,#0f2d4a,#1a6b8a)"];
  const addCity=db=>{
    const city={id:"eu_"+db.id+"_"+Date.now(),name:db.name,flag:db.flag,country:db.country,dates:"",nights:2,currency:db.currency,currencyTip:db.currencyTip,accent:db.accent,bg:BGS[Math.floor(Math.random()*BGS.length)],isCustom:true,restaurants:[],foods:[],snacks:[...(aiSnacks[db.id]||[])],attractions:[],activities:[]};
    onAdd(city);setPreview(null);
  };
  const already=c=>existingIds.some(id=>id.includes("eu_"+c.id)||id===c.id);
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.98)",zIndex:200,display:"flex",flexDirection:"column",fontFamily:"Georgia,serif",maxWidth:480,margin:"0 auto"}}>
    <div style={{background:"linear-gradient(135deg,#0d1f3c,#1b4332)",padding:"13px 12px 11px",borderBottom:"1px solid #1a2a1a",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
        <div><div style={{fontSize:15,fontWeight:"bold",color:"#f5a623"}}>🌍 Avrupa Şehir Rehberi</div><div style={{fontSize:9,color:"#334",marginTop:1}}>{EU_DB.length} şehir · AI ile ara öğün</div></div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#aaa",borderRadius:7,padding:"5px 10px",cursor:"pointer"}}>✕</button>
      </div>
      <div style={{position:"relative",marginBottom:7}}>
        <div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",opacity:0.4}}><SearchIcon s={13}/></div>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Şehir ara..." style={{width:"100%",background:"rgba(0,0,0,0.5)",border:"1px solid #1a3a2a",borderRadius:8,padding:"7px 9px 7px 30px",color:"#fff",fontSize:12,boxSizing:"border-box",outline:"none"}}/>
      </div>
      <div style={{display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none"}}>
        {countries.map(c=><button key={c} onClick={()=>setCountry(c)} style={{flexShrink:0,padding:"3px 8px",border:"none",borderRadius:9,cursor:"pointer",background:country===c?"#f5a623":"rgba(255,255,255,0.1)",color:country===c?"#000":"#555",fontSize:9,fontWeight:"bold"}}>{c}</button>)}
      </div>
    </div>
    {preview&&<div style={{background:"#0a1a0f",borderBottom:"1px solid #1a3a2a",padding:12,flexShrink:0,maxHeight:"45vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div><div style={{fontSize:15,fontWeight:"bold"}}>{preview.flag} {preview.name}</div><div style={{fontSize:10,color:"#334",marginTop:1}}>{preview.country} · {preview.currency}</div></div>
        <button onClick={()=>setPreview(null)} style={{background:"transparent",border:"none",color:"#333",cursor:"pointer",fontSize:13}}>✕</button>
      </div>
      <div style={{fontSize:9,color:"#4fc3f7",fontWeight:"bold",marginBottom:5,letterSpacing:1}}>🍿 MEŞHUR ARA ÖĞÜNLER</div>
      {loadingAI&&<div style={{textAlign:"center",padding:"18px",color:"#334",fontSize:11}}><div style={{fontSize:22,marginBottom:6}}>🤖</div><div>AI araştırıyor...</div></div>}
      {!loadingAI&&preview.snacks.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,padding:"5px 7px",background:"rgba(255,255,255,0.04)",borderRadius:7}}>
        <span style={{fontSize:15,flexShrink:0}}>{s.emoji}</span>
        <div style={{flex:1}}><div style={{fontSize:11,color:"#ccc",fontWeight:"bold"}}>{s.name}</div><div style={{fontSize:9,color:"#234"}}>{s.price} · {s.where}</div></div>
        <MapBtn q={s.mq||`${s.name} ${preview.name}`} label="" accent="#4fc3f7" small/>
      </div>)}
      {already(preview)?
        <div style={{background:"#0d2010",borderRadius:8,padding:"8px",textAlign:"center",fontSize:11,color:"#4fc3f7"}}>✓ Bu şehir zaten planınızda</div>:
        <button onClick={()=>addCity(preview)} style={{width:"100%",background:"linear-gradient(90deg,#f5a623,#e74c8b)",border:"none",color:"#000",borderRadius:8,padding:"10px",fontSize:12,fontWeight:"bold",cursor:"pointer",marginTop:8}}>{preview.flag} {preview.name} — Planıma Ekle!</button>
      }
    </div>}
    <div style={{flex:1,overflowY:"auto",padding:9}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        {filtered.map(c=>{const added=already(c);const sel=preview?.id===c.id;return(
          <div key={c.id} onClick={()=>fetchSnacks(c)} style={{background:sel?"#1a2a1a":"#0d0d0d",border:`2px solid ${sel?"#4fc3f7":added?"#1a4a2a":"#181818"}`,borderRadius:11,padding:"10px 9px",cursor:"pointer",position:"relative"}}>
            {added&&<div style={{position:"absolute",top:5,right:5,background:"#1a4a2a",color:"#4fc3f7",borderRadius:4,padding:"1px 4px",fontSize:8,fontWeight:"bold"}}>✓</div>}
            <div style={{fontSize:19,marginBottom:2}}>{c.flag}</div>
            <div style={{fontSize:11,fontWeight:"bold",color:sel?"#4fc3f7":"#ddd"}}>{c.name}</div>
            <div style={{fontSize:8,color:"#234",marginTop:1}}>{c.country}</div>
            <div style={{fontSize:8,color:"#1a3a2a",marginTop:2}}>{c.currency.split(" ")[0]}</div>
          </div>
        );})}
      </div>
    </div>
  </div>;
}

function App(){
  const [cities,setCities]=useState(()=>{const cc=load("cc9",[]);return cc.length?[...CITIES0,...cc]:CITIES0;});
  const [customItems,setCustomItems]=useState(()=>load("ci9",{}));
  const [progress,setProgress]=useState(()=>load("tp9",{}));
  const [photos,setPhotos]=useState(()=>load("ph9",{}));
  const [activeTab,setActiveTab]=useState("cities");
  const [selCity,setSelCity]=useState(null);
  const [cityTab,setCityTab]=useState("checklist");
  const [modal,setModal]=useState(null);
  const [addMode,setAddMode]=useState(null);
  const [showMap,setShowMap]=useState(false);
  const [cityFilters,setCityFilters]=useState(()=>load("cf9",{}));
  const [customFilters,setCustomFilters]=useState(()=>load("cuf9",{}));

  const getItems=useCallback((cid,t)=>{const city=cities.find(c=>c.id===cid);return[...(city?.[t]||[]),...(customItems[cid]?.[t]||[]).map(i=>({...i,isCustom:true}))];},[cities,customItems]);
  const addCustomItem=(cid,t,item)=>{const prev=customItems[cid]||{};const nc={...customItems,[cid]:{...prev,[t]:[...(prev[t]||[]),item]}};setCustomItems(nc);save("ci9",nc);setModal(null);};
  const deleteCustomItem=(cid,t,gi)=>{const city=cities.find(c=>c.id===cid);const bl=(city?.[t]||[]).length;const ci2=gi-bl;if(ci2<0)return;const prev=customItems[cid]||{};const nc={...customItems,[cid]:{...prev,[t]:(prev[t]||[]).filter((_,i)=>i!==ci2)}};setCustomItems(nc);save("ci9",nc);};
  const toggleCheck=(cid,t,i)=>{const k=`${cid}_${t}_${i}`;const np={...progress,[k]:!progress[k]};setProgress(np);save("tp9",np);};
  const addPhoto=(cid,t,i,b64)=>{const k=`${cid}_${t}_${i}`;const np={...photos,[k]:[...(photos[k]||[]),b64]};setPhotos(np);save("ph9",np);};
  const deletePhoto=(cid,t,i,pi)=>{const k=`${cid}_${t}_${i}`;const np={...photos,[k]:(photos[k]||[]).filter((_,j)=>j!==pi)};setPhotos(np);save("ph9",np);};
  const setFilter=(cid,f)=>{const nc={...cityFilters,[cid]:f};setCityFilters(nc);save("cf9",nc);};
  const saveCustomFilter=(cid,f)=>{const prev=customFilters[cid]||[];const nc={...customFilters,[cid]:[...prev,f]};setCustomFilters(nc);save("cuf9",nc);};
  const deleteCustomFilter=(cid,fid)=>{const nc={...customFilters,[cid]:(customFilters[cid]||[]).filter(f=>f.id!==fid)};setCustomFilters(nc);save("cuf9",nc);if(cityFilters[cid]?.id===fid)setFilter(cid,PRESETS[0]);};
  const getChecked=(cid,t,i)=>!!progress[`${cid}_${t}_${i}`];
  const getPhotos=(cid,t,i)=>photos[`${cid}_${t}_${i}`]||[];
  const getCityProg=c=>{let d=0,t=0;["restaurants","foods","snacks","attractions","activities"].forEach(type=>{const a=getItems(c.id,type);t+=a.length;a.forEach((_,i)=>{if(getChecked(c.id,type,i))d++;});});return{done:d,total:t,pct:t?Math.round(d/t*100):0};};
  const addCity=city=>{const nc=[...cities,city];setCities(nc);save("cc9",nc.filter(c=>c.isCustom));setAddMode(null);};
  const deleteCity=id=>{if(!window.confirm("Bu şehri sil?"))return;const nc=cities.filter(c=>c.id!==id);setCities(nc);save("cc9",nc.filter(c=>c.isCustom));if(selCity===id)setSelCity(null);};

  const city=selCity?cities.find(c=>c.id===selCity):null;

  if(showMap)return <RouteMap cities={cities} onClose={()=>setShowMap(false)}/>;
  if(addMode==="browser")return <EUCityBrowser onAdd={addCity} onClose={()=>setAddMode(null)} existingIds={cities.map(c=>c.id)}/>;
  if(addMode==="manual")return <AddCityManual onAdd={addCity} onClose={()=>setAddMode(null)}/>;

  /* CITY DETAIL */
  if(city){
    const prog=getCityProg(city);
    const af=cityFilters[city.id]||PRESETS[0];
    const myCF=customFilters[city.id]||[];
    const CTABS=[{id:"checklist",l:"☑️ Hepsi"},{id:"restaurants",l:"🍽️ Restoran"},{id:"foods",l:"🥘 Yemek"},{id:"snacks",l:"🍿 Ara"},{id:"attractions",l:"🗺️ Geziler"},{id:"activities",l:"🎯 Etkinlik"}];
    const Row=({type,item,i})=><CheckItem label={item.name} sub={[item.price,item.where||item.type||item.addr].filter(Boolean).join(" — ")} checked={getChecked(city.id,type,i)} onToggle={()=>toggleCheck(city.id,type,i)} accent={city.accent} emoji={item.emoji} photos={getPhotos(city.id,type,i)} onAddPhoto={b=>addPhoto(city.id,type,i,b)} onDeletePhoto={pi=>deletePhoto(city.id,type,i,pi)} mq={item.mq||item.addr} onDelete={item.isCustom?()=>deleteCustomItem(city.id,type,i):null} dimmed={!passFilter(item,af,city.currency)}/>;
    const AddBtn=({type})=><button onClick={()=>setModal({type,cityId:city.id})} style={{width:"100%",background:"transparent",border:`1px dashed ${city.accent}33`,borderRadius:7,padding:"7px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4,color:city.accent,fontSize:10,marginTop:3}}><PlusIcon s={11}/>{MODALS[type].title}</button>;
    return <div style={{minHeight:"100vh",background:"#080808",color:"#fff",maxWidth:480,margin:"0 auto",fontFamily:"Georgia,serif"}}>
      {modal&&MODALS[modal.type]&&<AddItemModal {...MODALS[modal.type]} accent={city.accent} onSave={item=>addCustomItem(city.id,modal.type,item)} onClose={()=>setModal(null)}/>}
      {/* HEADER */}
      <div style={{background:city.bg,position:"sticky",top:0,zIndex:10,paddingBottom:7}}>
        <div style={{display:"flex",alignItems:"center",gap:5,padding:"10px 11px 0"}}>
          <button onClick={()=>{setSelCity(null);setCityTab("checklist");}} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:12,padding:"4px 8px",cursor:"pointer",fontSize:11}}>← Geri</button>
          <div style={{flex:1}}><div style={{fontSize:15,fontWeight:"bold"}}>{city.flag} {city.name}</div><div style={{fontSize:9,opacity:0.6}}>{city.dates||"—"} · {city.nights} gece · {city.currency}</div></div>
          <div style={{display:"flex",gap:4}}>
            <MapBtn q={`${city.name} ${city.country||""}`} label="" accent={city.accent} small/>
            {city.isCustom&&<button onClick={()=>deleteCity(city.id)} style={{background:"rgba(255,0,0,0.15)",border:"none",color:"#ff8888",borderRadius:5,padding:"3px 5px",cursor:"pointer"}}><TrashIcon s={12}/></button>}
          </div>
        </div>
        <div style={{margin:"5px 11px 0",background:"rgba(0,0,0,0.25)",borderRadius:7,padding:"4px 8px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:8,color:"rgba(255,255,255,0.4)"}}>İlerleme</span><span style={{fontSize:9,fontWeight:"bold",color:city.accent}}>{prog.done}/{prog.total} · %{prog.pct}</span></div>
          <div style={{background:"rgba(0,0,0,0.4)",borderRadius:3,height:3}}><div style={{background:city.accent,height:3,borderRadius:3,width:`${prog.pct}%`,transition:"width 0.4s"}}/></div>
        </div>
        <div style={{margin:"4px 11px 0",background:"rgba(255,255,255,0.08)",borderRadius:5,padding:"3px 7px",fontSize:9}}>💱 {city.currency} — {city.currencyTip}</div>
        <div style={{display:"flex",gap:3,padding:"5px 11px 0",overflowX:"auto",scrollbarWidth:"none"}}>
          {CTABS.map(t=><button key={t.id} onClick={()=>setCityTab(t.id)} style={{flexShrink:0,padding:"3px 7px",border:"none",borderRadius:11,cursor:"pointer",background:cityTab===t.id?city.accent:"rgba(255,255,255,0.1)",color:cityTab===t.id?"#000":"#999",fontSize:9,fontWeight:"bold"}}>{t.l}</button>)}
        </div>
      </div>
      <div style={{padding:11,paddingBottom:80}}>
        <BudgetPanel filter={af} onChange={f=>setFilter(city.id,f)} accent={city.accent} currency={city.currency} customFilters={myCF} onSaveCustom={f=>saveCustomFilter(city.id,f)} onDeleteCustom={fid=>deleteCustomFilter(city.id,fid)}/>
        {/* CHECKLIST TAB */}
        {cityTab==="checklist"&&<div>
          {[{type:"attractions",title:"🗺️ Gezilecek Yerler"},{type:"activities",title:"🎯 Etkinlikler"},{type:"restaurants",title:"🍽️ Restoranlar"},{type:"foods",title:"🥘 Yemekler"},{type:"snacks",title:"🍿 Ara Öğünler"}].map(s=>{
            const items=getItems(city.id,s.type);
            return items.length>0&&<div key={s.type} style={{marginBottom:12}}>
              <div style={{fontSize:9,color:city.accent,fontWeight:"bold",marginBottom:4,letterSpacing:1}}>{s.title}</div>
              {items.map((item,i)=><Row key={i} type={s.type} item={item} i={i}/>)}
            </div>;
          })}
          <div style={{background:"#0d0d0d",borderRadius:9,padding:9,marginTop:6,textAlign:"center",fontSize:9,color:"#1a1a1a"}}>Yukarıdaki sekmeleri kullanarak yeni öğeler ekleyebilirsiniz</div>
        </div>}
        {/* RESTAURANTS TAB */}
        {cityTab==="restaurants"&&<div>
          {getItems(city.id,"restaurants").map((r,i)=><RestCard key={i} r={r} accent={city.accent} idx={i} cityId={city.id} checked={getChecked(city.id,"restaurants",i)} onToggle={()=>toggleCheck(city.id,"restaurants",i)} photos={getPhotos(city.id,"restaurants",i)} onAddPhoto={b=>addPhoto(city.id,"restaurants",i,b)} onDeletePhoto={pi=>deletePhoto(city.id,"restaurants",i,pi)} onDelete={r.isCustom?()=>deleteCustomItem(city.id,"restaurants",i):null} dimmed={!passFilter(r,af,city.currency)}/>)}
          <AddBtn type="restaurants"/>
        </div>}
        {/* FOODS TAB */}
        {cityTab==="foods"&&<div>
          {getItems(city.id,"foods").map((item,i)=><Row key={i} type="foods" item={item} i={i}/>)}
          <AddBtn type="foods"/>
        </div>}
        {/* SNACKS TAB */}
        {cityTab==="snacks"&&<div>
          {getItems(city.id,"snacks").map((item,i)=><Row key={i} type="snacks" item={item} i={i}/>)}
          <AddBtn type="snacks"/>
        </div>}
        {/* ATTRACTIONS TAB */}
        {cityTab==="attractions"&&<div>
          {getItems(city.id,"attractions").map((item,i)=><Row key={i} type="attractions" item={item} i={i}/>)}
          <AddBtn type="attractions"/>
        </div>}
        {/* ACTIVITIES TAB */}
        {cityTab==="activities"&&<div>
          {getItems(city.id,"activities").map((item,i)=><Row key={i} type="activities" item={item} i={i}/>)}
          <AddBtn type="activities"/>
        </div>}
      </div>
    </div>;
  }

  /* HOME SCREEN */
  const totalProg=(()=>{let d=0,t=0;cities.forEach(c=>{const p=getCityProg(c);d+=p.done;t+=p.total;});return{done:d,total:t,pct:t?Math.round(d/t*100):0};})();
  return <div style={{minHeight:"100vh",background:"#080808",color:"#fff",maxWidth:480,margin:"0 auto",fontFamily:"Georgia,serif"}}>
    {/* TOP NAV */}
    <div style={{background:"linear-gradient(135deg,#0d1f0d,#1a2a1a)",padding:"13px 13px 10px",position:"sticky",top:0,zIndex:10,borderBottom:"1px solid #111"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div><div style={{fontSize:18,fontWeight:"bold",color:"#f5a623"}}>✈️ Avrupa Turu 2026</div><div style={{fontSize:10,color:"#334",marginTop:1}}>5 Tem – 22 Tem · 3 Kişi · 20 Gün</div></div>
        <button onClick={()=>setShowMap(true)} style={{background:"#0d2a1a",border:"1px solid #1a5a2a",color:"#4fc3f7",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:10,fontWeight:"bold",display:"flex",alignItems:"center",gap:4}}><GlobeIcon s={12}/>🗺️ Rota</button>
      </div>
      <div style={{background:"rgba(0,0,0,0.4)",borderRadius:8,padding:"6px 10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:9,color:"#334"}}>Genel İlerleme</span><span style={{fontSize:10,fontWeight:"bold",color:"#f5a623"}}>{totalProg.done}/{totalProg.total} · %{totalProg.pct}</span></div>
        <div style={{background:"rgba(0,0,0,0.5)",borderRadius:4,height:5}}><div style={{background:"linear-gradient(90deg,#f5a623,#e74c8b)",height:5,borderRadius:4,width:`${totalProg.pct}%`,transition:"width 0.5s"}}/></div>
      </div>
      <div style={{display:"flex",gap:5,marginTop:8}}>
        {["cities","transport","tickets"].map(t=><button key={t} onClick={()=>setActiveTab(t)} style={{flex:1,padding:"6px 4px",border:"none",borderRadius:9,cursor:"pointer",background:activeTab===t?"#f5a623":"rgba(255,255,255,0.08)",color:activeTab===t?"#000":"#666",fontSize:10,fontWeight:"bold"}}>
          {t==="cities"?"🏙️ Şehirler":t==="transport"?"🚄 Ulaşım":"🎟️ Biletler"}
        </button>)}
      </div>
    </div>

    <div style={{padding:11,paddingBottom:80}}>
      {/* CITIES TAB */}
      {activeTab==="cities"&&<div>
        {cities.map(c=>{const p=getCityProg(c);return(
          <div key={c.id} style={{background:c.bg,borderRadius:13,marginBottom:9,overflow:"hidden",border:"1px solid rgba(255,255,255,0.05)",position:"relative"}}>
            {c.isCustom&&<button onClick={e=>{e.stopPropagation();if(window.confirm(`"${c.name}" şehrini silmek istiyor musunuz?`))deleteCity(c.id);}} style={{position:"absolute",top:8,right:8,zIndex:5,background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,80,80,0.4)",color:"#ff6666",borderRadius:7,padding:"3px 7px",cursor:"pointer",fontSize:11,fontWeight:"bold",lineHeight:1}}>✕</button>}
            <div onClick={()=>{setSelCity(c.id);setCityTab("checklist");}} style={{padding:"12px 13px",cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:22}}>{c.flag}</span>
                  <div><div style={{fontSize:14,fontWeight:"bold"}}>{c.name}</div><div style={{fontSize:9,opacity:0.6,marginTop:1}}>{c.country}</div></div>
                </div>
                <div style={{textAlign:"right",paddingRight:c.isCustom?24:0}}>
                  <div style={{fontSize:10,color:c.accent,fontWeight:"bold"}}>{c.dates||"—"}</div>
                  <div style={{fontSize:9,opacity:0.5,marginTop:1}}>{c.nights} gece</div>
                </div>
              </div>
              <div style={{background:"rgba(0,0,0,0.3)",borderRadius:6,padding:"5px 8px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:8,color:"rgba(255,255,255,0.4)"}}>İlerleme</span><span style={{fontSize:9,fontWeight:"bold",color:c.accent}}>{p.done}/{p.total} · %{p.pct}</span></div>
                <div style={{background:"rgba(0,0,0,0.4)",borderRadius:3,height:3}}><div style={{background:c.accent,height:3,borderRadius:3,width:`${p.pct}%`,transition:"width 0.4s"}}/></div>
              </div>
              <div style={{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}}>
                {["restaurants","foods","snacks","attractions","activities"].map(t=>{const items=getItems(c.id,t);const done=items.filter((_,i)=>getChecked(c.id,t,i)).length;return items.length>0&&<div key={t} style={{background:"rgba(0,0,0,0.3)",borderRadius:5,padding:"2px 6px",fontSize:8,color:done===items.length?c.accent:"rgba(255,255,255,0.4)"}}>{done}/{items.length} {t==="restaurants"?"🍽️":t==="foods"?"🥘":t==="snacks"?"🍿":t==="attractions"?"🗺️":"🎯"}</div>;})}
              </div>
            </div>
            </div>
          </div>
        );})}
        {/* ADD BUTTONS */}
        <div style={{display:"flex",gap:6,marginTop:4}}>
          <button onClick={()=>setAddMode("browser")} style={{flex:1,background:"linear-gradient(135deg,#0d2a1a,#1a4a2a)",border:"1px solid #2a6a3a",color:"#4fc3f7",borderRadius:10,padding:"10px 8px",cursor:"pointer",fontSize:10,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><PlusIcon s={12}/>🌍 Avrupa Rehberi</button>
          <button onClick={()=>setAddMode("manual")} style={{flex:1,background:"#0d0d0d",border:"1px solid #1a1a1a",color:"#666",borderRadius:10,padding:"10px 8px",cursor:"pointer",fontSize:10,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><PlusIcon s={12}/>✏️ Manuel Ekle</button>
        </div>
      </div>}

      {/* TRANSPORT TAB */}
      {activeTab==="transport"&&<div>
        <div style={{fontSize:9,color:"#334",marginBottom:10}}>💡 Hepsi 3 kişi için. Tren biletleri esnek — erken alın!</div>
        {TRANSPORT.map((t,i)=><div key={i} style={{background:"#0d0d0d",borderRadius:11,marginBottom:7,padding:"11px 12px",border:"1px solid #181818"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
            <div><div style={{fontSize:13,fontWeight:"bold",color:"#ddd"}}>{t.from} → {t.to}</div><div style={{fontSize:10,color:"#334",marginTop:2}}>{t.type} · {t.duration}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:11,fontWeight:"bold",color:"#f5a623"}}>{t.price}</div><div style={{fontSize:9,color:"#334",marginTop:1}}>3 kişi: {t.total}</div></div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <a href={`https://www.${t.book.split(" / ")[0]}`} target="_blank" rel="noreferrer" style={{background:"rgba(79,195,247,0.1)",border:"1px solid rgba(79,195,247,0.3)",color:"#4fc3f7",borderRadius:6,padding:"4px 8px",fontSize:9,fontWeight:"bold"}}>🔗 {t.book.split(" / ")[0]}</a>
            <span style={{fontSize:9,color:t.tip.includes("HEMEN")?"#ef5350":"#334"}}>{t.tip}</span>
          </div>
        </div>)}
      </div>}

      {/* TICKETS TAB */}
      {activeTab==="tickets"&&<div>
        <div style={{background:"linear-gradient(135deg,#1a0a0a,#2a1010)",borderRadius:10,padding:"9px 11px",marginBottom:10,border:"1px solid #3a1010"}}>
          <div style={{fontSize:10,fontWeight:"bold",color:"#ef5350",marginBottom:3}}>🔴 HEMEN ALINMASI GEREKENLER</div>
          <div style={{fontSize:9,color:"#5a2020",lineHeight:1.5}}>Son Akşam Yemeği (Milano) biletleri ve Venedik-İstanbul uçuşu kritik! Her gün doluyor.</div>
        </div>
        {TICKETS.map((t,i)=><div key={i} style={{background:"#0d0d0d",borderRadius:10,marginBottom:6,padding:"10px 11px",border:`1px solid ${t.color}22`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
            <div><div style={{fontSize:12,fontWeight:"bold",color:"#ddd"}}>{t.name}</div><div style={{fontSize:9,color:"#334",marginTop:1}}>{t.city}</div></div>
            <span style={{background:`${t.color}22`,color:t.color,borderRadius:6,padding:"2px 7px",fontSize:9,fontWeight:"bold",whiteSpace:"nowrap"}}>{t.urgent?"🔴 ACIL":"⏰"}</span>
          </div>
          <div style={{fontSize:9,color:t.color,marginBottom:6}}>📅 {t.when}</div>
          <a href={`https://www.${t.url}`} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:3,background:`${t.color}15`,border:`1px solid ${t.color}44`,color:t.color,borderRadius:6,padding:"5px 9px",fontSize:9,fontWeight:"bold"}}>🔗 {t.url}</a>
        </div>)}
      </div>}
    </div>

    {/* BOTTOM NAV */}
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(8,8,8,0.97)",backdropFilter:"blur(10px)",borderTop:"1px solid #141414",padding:"8px 13px 12px",display:"flex",gap:6}}>
      {["cities","transport","tickets"].map(t=><button key={t} onClick={()=>setActiveTab(t)} style={{flex:1,padding:"7px 4px",border:"none",borderRadius:9,cursor:"pointer",background:activeTab===t?"#f5a623":"rgba(255,255,255,0.06)",color:activeTab===t?"#000":"#444",fontSize:10,fontWeight:"bold"}}>
        {t==="cities"?"🏙️ Şehirler":t==="transport"?"🚄 Ulaşım":"🎟️ Biletler"}
      </button>)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(()=>console.log('SW registered')).catch(e=>console.log('SW error',e));
}
</script>
</body>
</html>
